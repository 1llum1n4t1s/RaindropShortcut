<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px;
    background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 50%, #93C5FD 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 40px;
  }
  .icon-area {
    display: flex; align-items: center; gap: 32px;
  }
  .icon-box {
    width: 160px; height: 160px;
    background: white;
    border-radius: 32px;
    box-shadow: 0 12px 40px rgba(37, 99, 235, 0.25);
    display: flex; align-items: center; justify-content: center;
  }
  .app-icon { width: 110px; height: 110px; }
  .title {
    font-size: 60px; font-weight: 800;
    color: #1E40AF;
    text-shadow: 0 2px 8px rgba(37, 99, 235, 0.15);
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 28px; font-weight: 500;
    color: #1E3A8A;
    opacity: 0.85;
  }
  .features {
    display: flex; gap: 40px; margin-top: 12px;
  }
  .feature {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255, 0.75);
    padding: 16px 28px;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .feature-icon { font-size: 32px; }
  .feature-text { font-size: 20px; font-weight: 600; color: #1E40AF; }
</style>
</head>
<body>
  <div class="container">
    <div class="icon-area">
      <div class="icon-box">
        <svg class="app-icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4A90D9"/>
              <stop offset="100%" stop-color="#2563EB"/>
            </linearGradient>
            <linearGradient id="dropGrad" x1="50%" y1="0%" x2="50%" y2="100%">
              <stop offset="0%" stop-color="#FFFFFF"/>
              <stop offset="100%" stop-color="#E0EAFF"/>
            </linearGradient>
          </defs>
          <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
          <g transform="translate(256, 248)">
            <path d="M0,-160 C60,-80 120,20 120,80 C120,146 66,200 0,200 C-66,200 -120,146 -120,80 C-120,20 -60,-80 0,-160Z" fill="url(#dropGrad)"/>
            <g transform="translate(0, 40)">
              <path d="M-40,-70 L-40,50 L0,25 L40,50 L40,-70 Z" fill="#2563EB" opacity="0.85"/>
            </g>
          </g>
        </svg>
      </div>
      <div class="title">Raindrop Shortcuts</div>
    </div>
    <div class="subtitle">Raindrop.io のブックマークにワンクリックでアクセス</div>
    <div class="features">
      <div class="feature">
        <span class="feature-icon">🔖</span>
        <span class="feature-text">ブックマーク一覧</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🔍</span>
        <span class="feature-text">インクリメンタル検索</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🌙</span>
        <span class="feature-text">ダークモード対応</span>
      </div>
    </div>
  </div>
</body>
</html>
